<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="منصة إدارة المحلات التجارية - Smart Store Management System">
    <meta name="theme-color" content="#1a3a52">
    <title>Store Hub - منصة إدارة المحلات</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a3a52;
            --primary-light: #2d5a7b;
            --secondary: #f39c12;
            --accent: #e74c3c;
            --text-dark: #2c3e50;
            --text-light: #ecf0f1;
            --text-muted: #7f8c8d;
            --bg-light: #f8f9fa;
            --bg-white: #ffffff;
            --bg-dark: #1a1a1a;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --shadow-md: 0 5px 20px rgba(0, 0, 0, 0.15);
            --transition: 0.3s ease;
            --success: #2ed573;
            --warning: #ff9f00;
            --danger: #ff5555;
        }

        html.dark-mode {
            --primary: #0f2438;
            --text-dark: #e4e6eb;
            --bg-light: #1a1a1a;
            --bg-white: #242424;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            background-color: var(--bg-light);
            transition: background-color var(--transition), color var(--transition);
        }

        h1, h2, h3, h4, h5, h6 {
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 1rem;
        }

        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            transition: all var(--transition);
        }

        input, textarea, select {
            font-family: inherit;
        }

        /* ========================================
           LOGIN PAGE STYLES
           ======================================== */

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
        }

        .login-container {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            padding: 3rem 2rem;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            font-size: 2rem;
            color: white;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: white;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            transition: all var(--transition);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--secondary);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 20px rgba(243, 156, 18, 0.3);
        }

        .login-btn {
            width: 100%;
            padding: 1.1rem;
            background: linear-gradient(135deg, var(--secondary) 0%, #d68910 100%);
            color: white;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .login-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(243, 156, 18, 0.4);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status-message {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            animation: slideUp 0.3s ease;
            display: none;
        }

        .status-message.error {
            background: rgba(231, 76, 60, 0.1);
            color: #ec7063;
            border-left: 4px solid var(--danger);
            display: block;
        }

        .status-message.success {
            background: rgba(46, 213, 115, 0.1);
            color: var(--success);
            border-left: 4px solid var(--success);
            display: block;
        }

        /* ========================================
           DASHBOARD PAGE STYLES
           ======================================== */

        .dashboard-page {
            min-height: 100vh;
            background: var(--bg-light);
        }

        .navbar {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-md);
        }

        .navbar-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .navbar-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--secondary) 0%, #d68910 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        .store-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-dark);
            font-weight: 600;
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .nav-btn {
            padding: 0.7rem 1.5rem;
            border-radius: 10px;
            background: var(--secondary);
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .nav-btn:hover {
            background: #d68910;
            transform: translateY(-2px);
        }

        .logout-btn {
            background: var(--accent);
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* ========================================
           TABS SYSTEM
           ======================================== */

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid rgba(0, 0, 0, 0.1);
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 1rem 1.5rem;
            background: transparent;
            color: var(--text-muted);
            border-bottom: 3px solid transparent;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .tab-btn:hover {
            color: var(--text-dark);
        }

        .tab-btn.active {
            color: var(--secondary);
            border-bottom-color: var(--secondary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* ========================================
           DASHBOARD STATS
           ======================================== */

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 2rem;
            border-radius: 15px;
            text-align: center;
            box-shadow: var(--shadow-md);
            transition: all var(--transition);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--secondary);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--secondary);
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* ========================================
           PRODUCTS GRID
           ======================================== */

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .product-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            overflow: hidden;
            transition: all var(--transition);
            box-shadow: var(--shadow-md);
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: var(--secondary);
            box-shadow: 0 15px 40px rgba(243, 156, 18, 0.2);
        }

        .product-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .product-content {
            padding: 1.5rem;
        }

        .product-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .product-price {
            font-size: 1.5rem;
            color: var(--secondary);
            font-weight: 900;
            margin-bottom: 0.5rem;
        }

        .product-meta {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .product-status {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .product-status.available {
            background: rgba(46, 213, 115, 0.1);
            color: var(--success);
        }

        .product-status.unavailable {
            background: rgba(255, 85, 85, 0.1);
            color: var(--danger);
        }

        .product-actions {
            display: flex;
            gap: 0.5rem;
        }

        .product-actions button {
            flex: 1;
            padding: 0.7rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .btn-edit {
            background: var(--secondary);
            color: white;
        }

        .btn-edit:hover {
            background: #d68910;
        }

        .btn-delete {
            background: var(--accent);
            color: white;
        }

        .btn-delete:hover {
            background: #c0392b;
        }

        /* ========================================
           VIDEOS GRID
           ======================================== */

        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .video-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            overflow: hidden;
            transition: all var(--transition);
            box-shadow: var(--shadow-md);
        }

        .video-card:hover {
            transform: translateY(-10px);
            border-color: var(--secondary);
        }

        .video-embed {
            width: 100%;
            padding-bottom: 56.25%;
            position: relative;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
        }

        .video-embed iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 15px 15px 0 0;
        }

        .video-content {
            padding: 1.5rem;
        }

        .video-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .video-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .video-actions {
            display: flex;
            gap: 0.5rem;
        }

        /* ========================================
           FORMS
           ======================================== */

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-white);
            padding: 2rem;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--bg-light);
            padding-bottom: 1rem;
        }

        .modal-header h2 {
            color: var(--primary);
            margin: 0;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 2rem;
            color: var(--text-muted);
            cursor: pointer;
        }

        .close-modal:hover {
            color: var(--accent);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.9rem;
            border: 2px solid var(--bg-light);
            border-radius: 10px;
            font-size: 1rem;
            color: var(--text-dark);
            background: var(--bg-white);
            transition: all var(--transition);
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 15px rgba(243, 156, 18, 0.2);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--secondary) 0%, #d68910 100%);
            color: white;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(243, 156, 18, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* ========================================
           SEARCH & FILTER
           ======================================== */

        .search-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 0.9rem;
            border: 2px solid var(--bg-light);
            border-radius: 10px;
            font-size: 1rem;
            color: var(--text-dark);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--secondary);
        }

        .filter-select {
            padding: 0.9rem;
            border: 2px solid var(--bg-light);
            border-radius: 10px;
            background: var(--bg-white);
            color: var(--text-dark);
            font-size: 1rem;
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--secondary);
        }

        .add-btn {
            padding: 0.9rem 2rem;
            background: linear-gradient(135deg, var(--secondary) 0%, #d68910 100%);
            color: white;
            border-radius: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(243, 156, 18, 0.3);
        }

        /* ========================================
           THEME TOGGLE
           ======================================== */

        .theme-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--secondary) 0%, #d68910 100%);
            font-size: 1.5rem;
            box-shadow: 0 5px 20px rgba(243, 156, 18, 0.3);
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-toggle:hover {
            transform: scale(1.15) translateY(-5px);
        }

        /* ========================================
           LOADING & ANIMATIONS
           ======================================== */

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top-color: var(--secondary);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }

        .empty-state p {
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        /* ========================================
           RESPONSIVE DESIGN
           ======================================== */

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .navbar-content {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }

            .navbar-left {
                width: 100%;
                justify-content: center;
            }

            .navbar-right {
                width: 100%;
                justify-content: center;
            }

            .stats-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            }

            .products-grid,
            .videos-grid {
                grid-template-columns: 1fr;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .search-bar {
                flex-direction: column;
            }

            .search-input {
                width: 100%;
            }

            .modal-content {
                width: 95%;
            }

            .tabs {
                gap: 0.5rem;
                overflow-x: auto;
            }

            .tab-btn {
                padding: 0.8rem 1rem;
                font-size: 0.85rem;
            }

            .theme-toggle {
                bottom: 20px;
                right: 20px;
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 2rem 1.5rem;
            }

            .login-header h1 {
                font-size: 1.5rem;
            }

            .stat-number {
                font-size: 2rem;
            }

            .product-card,
            .video-card {
                margin: 0;
            }
        }
    </style>
</head>
<body>
    <!-- === LOGIN PAGE === -->
    <div id="loginPage" class="page active">
        <div class="login-page">
            <div class="login-container">
                <div class="login-header">
                    <h1>🏪 Store Hub</h1>
                    <p>منصة إدارة المحلات التجارية</p>
                </div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">اسم المستخدم</label>
                        <input 
                            type="text" 
                            id="username" 
                            placeholder="ادخل اسم المستخدم" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="password">كلمة المرور</label>
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="ادخل كلمة المرور" 
                            required
                        >
                    </div>

                    <button type="submit" class="login-btn" id="loginBtn">
                        دخول
                    </button>
                </form>

                <div id="loginStatus" class="status-message"></div>
            </div>
        </div>
    </div>

    <!-- === DASHBOARD PAGE === -->
    <div id="dashboardPage" class="page">
        <div class="dashboard-page">
            <!-- === NAVBAR === -->
            <nav class="navbar">
                <div class="navbar-content">
                    <div class="navbar-left">
                        <a href="#" class="logo">🏪 Store Hub</a>
                        <div class="store-info" id="storeInfo"></div>
                    </div>
                    <div class="navbar-right">
                        <button class="nav-btn" id="logoutBtn">تسجيل الخروج</button>
                        <button class="theme-toggle" id="themeToggle">🌙</button>
                    </div>
                </div>
            </nav>

            <!-- === MAIN CONTAINER === -->
            <div class="container">
                <!-- === TABS === -->
                <div class="tabs">
                    <button class="tab-btn active" data-tab="dashboard">📊 لوحة التحكم</button>
                    <button class="tab-btn" data-tab="products">🛒 المنتجات</button>
                    <button class="tab-btn" data-tab="videos">📺 الفيديوهات</button>
                    <button class="tab-btn" data-tab="settings">⚙️ الإعدادات</button>
                </div>

                <!-- === DASHBOARD TAB === -->
                <div id="dashboard" class="tab-content active">
                    <div class="stats-grid" id="statsGrid"></div>
                    <h2>📦 آخر المنتجات المضافة</h2>
                    <div class="products-grid" id="recentProducts"></div>
                </div>

                <!-- === PRODUCTS TAB === -->
                <div id="products" class="tab-content">
                    <div class="search-bar">
                        <input 
                            type="text" 
                            class="search-input" 
                            id="productSearch" 
                            placeholder="البحث عن منتج..."
                        >
                        <select id="categoryFilter" class="filter-select">
                            <option value="">جميع الفئات</option>
                        </select>
                        <select id="statusFilter" class="filter-select">
                            <option value="">الكل</option>
                            <option value="available">متوفر</option>
                            <option value="unavailable">غير متوفر</option>
                        </select>
                        <button class="add-btn" id="addProductBtn">➕ إضافة منتج</button>
                    </div>
                    <div class="products-grid" id="productsGrid"></div>
                    <div id="noProducts" class="empty-state" style="display: none;">
                        <p>لا توجد منتجات حتى الآن</p>
                    </div>
                </div>

                <!-- === VIDEOS TAB === -->
                <div id="videos" class="tab-content">
                    <div class="search-bar">
                        <input 
                            type="text" 
                            class="search-input" 
                            id="videoSearch" 
                            placeholder="البحث عن فيديو..."
                        >
                        <button class="add-btn" id="addVideoBtn">➕ إضافة فيديو</button>
                    </div>
                    <div class="videos-grid" id="videosGrid"></div>
                    <div id="noVideos" class="empty-state" style="display: none;">
                        <p>لا توجد فيديوهات حتى الآن</p>
                    </div>
                </div>

                <!-- === SETTINGS TAB === -->
                <div id="settings" class="tab-content">
                    <h2>🏪 بيانات المحل</h2>
                    <div style="background: var(--glass-bg); padding: 2rem; border-radius: 15px; max-width: 600px;">
                        <div class="form-group">
                            <label>اسم المحل:</label>
                            <input type="text" id="storeName" readonly>
                        </div>
                        <div class="form-group">
                            <label>العنوان:</label>
                            <input type="text" id="storeAddress" readonly>
                        </div>
                        <div class="form-group">
                            <label>الهاتف:</label>
                            <input type="text" id="storePhone" readonly>
                        </div>
                        <div class="form-group">
                            <label>الوصف:</label>
                            <textarea id="storeDesc" readonly></textarea>
                        </div>
                        <button class="submit-btn" id="editStoreBtn" style="width: 100%; padding: 1rem;">تعديل البيانات</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- === ADD/EDIT PRODUCT MODAL === -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="productModalTitle">إضافة منتج جديد</h2>
                <button class="close-modal">&times;</button>
            </div>
            <form id="productForm">
                <div class="form-group">
                    <label for="productName">اسم المنتج *</label>
                    <input type="text" id="productName" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="productPrice">السعر *</label>
                        <input type="number" id="productPrice" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="productQuantity">الكمية *</label>
                        <input type="number" id="productQuantity" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="productCategory">التصنيف</label>
                    <input type="text" id="productCategory" placeholder="مثال: إلكترونيات">
                </div>

                <div class="form-group">
                    <label for="productDescription">الوصف</label>
                    <textarea id="productDescription"></textarea>
                </div>

                <div class="form-group">
                    <label for="productVideo">رابط فيديو YouTube (اختياري)</label>
                    <input type="url" id="productVideo" placeholder="https://www.youtube.com/watch?v=...">
                </div>

                <div class="form-group">
                    <label for="productImage">رابط الصورة (اختياري)</label>
                    <input type="url" id="productImage">
                </div>

                <div class="form-group">
                    <label for="productStatus">حالة التوفر</label>
                    <select id="productStatus">
                        <option value="available">متوفر</option>
                        <option value="unavailable">غير متوفر</option>
                    </select>
                </div>

                <button type="submit" class="submit-btn" id="submitProductBtn">حفظ المنتج</button>
            </form>
        </div>
    </div>

    <!-- === ADD/EDIT VIDEO MODAL === -->
    <div id="videoModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="videoModalTitle">إضافة فيديو جديد</h2>
                <button class="close-modal">&times;</button>
            </div>
            <form id="videoForm">
                <div class="form-group">
                    <label for="videoTitle">عنوان الفيديو *</label>
                    <input type="text" id="videoTitle" required>
                </div>

                <div class="form-group">
                    <label for="videoUrl">رابط فيديو YouTube *</label>
                    <input type="url" id="videoUrl" placeholder="https://www.youtube.com/watch?v=..." required>
                </div>

                <div class="form-group">
                    <label for="videoDescription">الوصف</label>
                    <textarea id="videoDescription"></textarea>
                </div>

                <button type="submit" class="submit-btn" id="submitVideoBtn">حفظ الفيديو</button>
            </form>
        </div>
    </div>

    <!-- === MAIN APPLICATION SCRIPT === -->
    <script>
        /**
         * === STORE HUB - MULTI-STORE MANAGEMENT SYSTEM ===
         * 
         * فكرة النظام:
         * - منصة تحتوي على عدة محلات تجارية
         * - كل محل له حساب تسجيل دخول مستقل
         * - بيانات مستقلة باستخدام Google Sheets
         * - نظام إدارة منتجات وفيديوهات
         * - لوحة تحكم شاملة لكل محل
         */

        // === CONFIG - تحتاج تعديل ب��ابط Google Apps Script === 
        const CONFIG = {
            // استبدل هذا برابط Google Apps Script الخاص بك
            googleAppsScriptURL: 'https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec',
            
            // أو استخدم localStorage للتطوير
            useLocalStorage: true
        };

        // === MAIN APP OBJECT ===
        const APP = {
            currentUser: null,
            currentStore: null,
            products: [],
            videos: [],
            editingProductId: null,
            editingVideoId: null,

            // === INITIALIZATION ===
            init() {
                this.setupTheme();
                this.setupEventListeners();
                this.checkSession();
                console.log('✅ Store Hub App Initialized');
            },

            // === THEME SYSTEM ===
            setupTheme() {
                const themeToggle = document.getElementById('themeToggle');
                
                // Load saved theme
                if (localStorage.getItem('theme') === 'dark') {
                    document.documentElement.classList.add('dark-mode');
                    themeToggle.textContent = '☀️';
                }

                themeToggle.addEventListener('click', () => {
                    const isDark = document.documentElement.classList.toggle('dark-mode');
                    localStorage.setItem('theme', isDark ? 'dark' : 'light');
                    themeToggle.textContent = isDark ? '☀️' : '🌙';
                });
            },

            // === EVENT LISTENERS ===
            setupEventListeners() {
                // === LOGIN ===
                document.getElementById('loginForm')?.addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.handleLogin();
                });

                // === LOGOUT ===
                document.getElementById('logoutBtn')?.addEventListener('click', () => {
                    this.logout();
                });

                // === TABS ===
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        this.switchTab(e.target.dataset.tab);
                    });
                });

                // === PRODUCTS ===
                document.getElementById('addProductBtn')?.addEventListener('click', () => {
                    this.openProductModal();
                });

                document.getElementById('productForm')?.addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.saveProduct();
                });

                document.getElementById('productSearch')?.addEventListener('input', (e) => {
                    this.filterProducts(e.target.value);
                });

                document.getElementById('categoryFilter')?.addEventListener('change', () => {
                    this.applyProductFilters();
                });

                document.getElementById('statusFilter')?.addEventListener('change', () => {
                    this.applyProductFilters();
                });

                // === VIDEOS ===
                document.getElementById('addVideoBtn')?.addEventListener('click', () => {
                    this.openVideoModal();
                });

                document.getElementById('videoForm')?.addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.saveVideo();
                });

                document.getElementById('videoSearch')?.addEventListener('input', (e) => {
                    this.filterVideos(e.target.value);
                });

                // === MODALS ===
                document.querySelectorAll('.close-modal').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.target.closest('.modal').classList.remove('active');
                    });
                });

                // Close modal on outside click
                document.querySelectorAll('.modal').forEach(modal => {
                    modal.addEventListener('click', (e) => {
                        if (e.target === modal) {
                            modal.classList.remove('active');
                        }
                    });
                });
            },

            // === LOGIN SYSTEM ===
            async handleLogin() {
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;
                const statusEl = document.getElementById('loginStatus');
                const btnEl = document.getElementById('loginBtn');

                if (!username || !password) {
                    this.showMessage(statusEl, 'يرجى ملء جميع الحقول', 'error');
                    return;
                }

                btnEl.disabled = true;
                btnEl.innerHTML = '<div class="loading"></div>';

                try {
                    // === SECURITY: Validate login from Google Sheets ===
                    const storeData = await this.validateLogin(username, password);

                    if (storeData) {
                        // === STORE SESSION ===
                        this.currentUser = username;
                        this.currentStore = storeData;
                        localStorage.setItem('currentUser', username);
                        localStorage.setItem('currentStore', JSON.stringify(storeData));

                        this.showMessage(statusEl, '✅ تم تسجيل الدخول بنجاح', 'success');
                        
                        setTimeout(() => {
                            this.switchPage('dashboard');
                            this.loadDashboard();
                        }, 500);
                    } else {
                        this.showMessage(statusEl, '❌ اسم المستخدم أو كلمة المرور غير صحيحة', 'error');
                    }
                } catch (error) {
                    console.error('Login error:', error);
                    this.showMessage(statusEl, '❌ حدث خطأ في الاتصال', 'error');
                } finally {
                    btnEl.disabled = false;
                    btnEl.textContent = 'دخول';
                }
            },

            // === VALIDATE LOGIN ===
            async validateLogin(username, password) {
                // === FOR DEVELOPMENT: Use localStorage data ===
                if (CONFIG.useLocalStorage) {
                    const stores = JSON.parse(localStorage.getItem('storesData') || '[]');
                    const store = stores.find(s => s.username === username && s.password === password);
                    return store ? store : null;
                }

                // === FOR PRODUCTION: Call Google Apps Script ===
                try {
                    const response = await fetch(CONFIG.googleAppsScriptURL, {
                        method: 'POST',
                        body: JSON.stringify({
                            action: 'validateLogin',
                            username: username,
                            password: password
                        })
                    });
                    return await response.json();
                } catch (error) {
                    console.error('Validation error:', error);
                    return null;
                }
            },

            // === CHECK SESSION ===
            checkSession() {
                const user = localStorage.getItem('currentUser');
                const store = localStorage.getItem('currentStore');

                if (user && store) {
                    this.currentUser = user;
                    this.currentStore = JSON.parse(store);
                    this.switchPage('dashboard');
                    this.loadDashboard();
                } else {
                    this.switchPage('login');
                }
            },

            // === LOGOUT ===
            logout() {
                if (confirm('هل تريد تسجيل الخروج؟')) {
                    localStorage.removeItem('currentUser');
                    localStorage.removeItem('currentStore');
                    this.currentUser = null;
                    this.currentStore = null;
                    this.products = [];
                    this.videos = [];
                    this.switchPage('login');
                    document.getElementById('loginForm').reset();
                }
            },

            // === PAGE SWITCHING ===
            switchPage(pageId) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(pageId + 'Page').classList.add('active');

                if (pageId === 'dashboard') {
                    // Update store info in navbar
                    document.getElementById('storeInfo').innerHTML = 
                        `<span>🏪 ${this.currentStore.storeName}</span>`;
                }
            },

            // === TAB SWITCHING ===
            switchTab(tabId) {
                // Update active tab button
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.tab === tabId);
                });

                // Update active tab content
                document.querySelectorAll('.tab-content').forEach(content => {
                    content.classList.remove('active');
                });
                document.getElementById(tabId).classList.add('active');

                // Load content if needed
                if (tabId === 'products') {
                    this.loadProducts();
                } else if (tabId === 'videos') {
                    this.loadVideos();
                } else if (tabId === 'settings') {
                    this.loadSettings();
                }
            },

            // === DASHBOARD ===
            async loadDashboard() {
                await this.loadProducts();
                await this.loadVideos();
                this.updateStats();
                this.displayRecentProducts();
            },

            updateStats() {
                const stats = [
                    { label: 'المنتجات', value: this.products.length, icon: '🛒' },
                    { label: 'المتوفر منها', value: this.products.filter(p => p.status === 'available').length, icon: '✓' },
                    { label: 'الفيديوهات', value: this.videos.length, icon: '📺' },
                    { label: 'الفئات', value: new Set(this.products.map(p => p.category)).size, icon: '📁' }
                ];

                const statsGrid = document.getElementById('statsGrid');
                statsGrid.innerHTML = stats.map(stat => `
                    <div class="stat-card">
                        <div class="stat-number">${stat.icon} ${stat.value}</div>
                        <div class="stat-label">${stat.label}</div>
                    </div>
                `).join('');
            },

            displayRecentProducts() {
                const recent = this.products.slice(-3).reverse();
                const container = document.getElementById('recentProducts');

                if (recent.length === 0) {
                    container.innerHTML = '<p class="empty-state">لا توجد منتجات بعد</p>';
                    return;
                }

                container.innerHTML = recent.map(product => this.createProductCard(product)).join('');
            },

            // === PRODUCTS SYSTEM ===
            async loadProducts() {
                if (CONFIG.useLocalStorage) {
                    const data = JSON.parse(localStorage.getItem(`products_${this.currentStore.id}`) || '[]');
                    this.products = data;
                } else {
                    // Fetch from Google Sheets
                    this.products = [];
                }

                this.populateCategoryFilter();
                this.displayProducts();
            },

            populateCategoryFilter() {
                const categories = [...new Set(this.products.map(p => p.category).filter(Boolean))];
                const filter = document.getElementById('categoryFilter');
                
                const currentValue = filter.value;
                filter.innerHTML = '<option value="">جميع الفئات</option>';
                categories.forEach(cat => {
                    filter.innerHTML += `<option value="${cat}">${cat}</option>`;
                });
                filter.value = currentValue;
            },

            displayProducts() {
                const grid = document.getElementById('productsGrid');
                const empty = document.getElementById('noProducts');

                if (this.products.length === 0) {
                    grid.innerHTML = '';
                    empty.style.display = 'block';
                    return;
                }

                empty.style.display = 'none';
                grid.innerHTML = this.products.map(product => this.createProductCard(product)).join('');

                // Add event listeners
                document.querySelectorAll('.btn-edit').forEach((btn, idx) => {
                    btn.addEventListener('click', () => this.editProduct(this.products[idx]));
                });

                document.querySelectorAll('.btn-delete').forEach((btn, idx) => {
                    btn.addEventListener('click', () => this.deleteProduct(idx));
                });
            },

            createProductCard(product) {
                const statusClass = product.status === 'available' ? 'available' : 'unavailable';
                const statusText = product.status === 'available' ? 'متوفر' : 'غير متوفر';

                return `
                    <div class="product-card">
                        <div class="product-image">📦</div>
                        <div class="product-content">
                            <div class="product-name">${this.escapeHtml(product.name)}</div>
                            <div class="product-price">${product.price} دج</div>
                            <div class="product-meta">
                                الكمية: ${product.quantity} | 
                                ${product.category ? `الفئة: ${product.category}` : ''}
                            </div>
                            <div class="product-status ${statusClass}">${statusText}</div>
                            ${product.description ? `<p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1rem;">${this.escapeHtml(product.description)}</p>` : ''}
                            <div class="product-actions">
                                <button class="product-actions button btn-edit">✏️ تعديل</button>
                                <button class="product-actions button btn-delete">🗑️ حذف</button>
                            </div>
                        </div>
                    </div>
                `;
            },

            openProductModal(product = null) {
                this.editingProductId = product ? this.products.indexOf(product) : null;
                const modal = document.getElementById('productModal');
                const form = document.getElementById('productForm');

                if (product) {
                    document.getElementById('productModalTitle').textContent = 'تعديل المنتج';
                    form.elements['productName'].value = product.name;
                    form.elements['productPrice'].value = product.price;
                    form.elements['productQuantity'].value = product.quantity;
                    form.elements['productCategory'].value = product.category || '';
                    form.elements['productDescription'].value = product.description || '';
                    form.elements['productVideo'].value = product.video || '';
                    form.elements['productImage'].value = product.image || '';
                    form.elements['productStatus'].value = product.status;
                } else {
                    document.getElementById('productModalTitle').textContent = 'إضافة منتج جديد';
                    form.reset();
                }

                modal.classList.add('active');
            },

            async saveProduct() {
                const form = document.getElementById('productForm');
                const product = {
                    id: this.editingProductId !== null ? this.products[this.editingProductId].id : Date.now(),
                    name: form.elements['productName'].value.trim(),
                    price: parseFloat(form.elements['productPrice'].value),
                    quantity: parseInt(form.elements['productQuantity'].value),
                    category: form.elements['productCategory'].value.trim(),
                    description: form.elements['productDescription'].value.trim(),
                    video: form.elements['productVideo'].value.trim(),
                    image: form.elements['productImage'].value.trim(),
                    status: form.elements['productStatus'].value,
                    createdAt: this.editingProductId !== null ? this.products[this.editingProductId].createdAt : new Date().toISOString()
                };

                // === VALIDATION ===
                if (!product.name || product.price < 0 || product.quantity < 0) {
                    alert('يرجى ملء جميع الحقول بشكل صحيح');
                    return;
                }

                if (this.editingProductId !== null) {
                    this.products[this.editingProductId] = product;
                } else {
                    this.products.push(product);
                }

                // === SAVE TO STORAGE ===
                localStorage.setItem(`products_${this.currentStore.id}`, JSON.stringify(this.products));

                document.getElementById('productModal').classList.remove('active');
                this.loadProducts();
                alert('✅ تم حفظ المنتج بنجاح');
            },

            editProduct(product) {
                this.openProductModal(product);
            },

            deleteProduct(index) {
                if (confirm('هل تريد حذف هذا المنتج؟')) {
                    this.products.splice(index, 1);
                    localStorage.setItem(`products_${this.currentStore.id}`, JSON.stringify(this.products));
                    this.loadProducts();
                    alert('✅ تم حذف المنتج');
                }
            },

            filterProducts(searchText) {
                const filtered = this.products.filter(p => 
                    p.name.toLowerCase().includes(searchText.toLowerCase()) ||
                    (p.description && p.description.toLowerCase().includes(searchText.toLowerCase()))
                );

                const grid = document.getElementById('productsGrid');
                grid.innerHTML = filtered.map(p => this.createProductCard(p)).join('');
            },

            applyProductFilters() {
                const category = document.getElementById('categoryFilter').value;
                const status = document.getElementById('statusFilter').value;

                let filtered = this.products;

                if (category) {
                    filtered = filtered.filter(p => p.category === category);
                }

                if (status) {
                    filtered = filtered.filter(p => p.status === status);
                }

                const grid = document.getElementById('productsGrid');
                grid.innerHTML = filtered.map(p => this.createProductCard(p)).join('');
            },

            // === VIDEOS SYSTEM ===
            async loadVideos() {
                if (CONFIG.useLocalStorage) {
                    const data = JSON.parse(localStorage.getItem(`videos_${this.currentStore.id}`) || '[]');
                    this.videos = data;
                } else {
                    this.videos = [];
                }

                this.displayVideos();
            },

            displayVideos() {
                const grid = document.getElementById('videosGrid');
                const empty = document.getElementById('noVideos');

                if (this.videos.length === 0) {
                    grid.innerHTML = '';
                    empty.style.display = 'block';
                    return;
                }

                empty.style.display = 'none';
                grid.innerHTML = this.videos.map(video => this.createVideoCard(video)).join('');

                // Add event listeners
                document.querySelectorAll('.video-card').forEach((card, idx) => {
                    const editBtn = card.querySelector('.btn-edit');
                    const deleteBtn = card.querySelector('.btn-delete');

                    if (editBtn) {
                        editBtn.addEventListener('click', () => this.editVideo(this.videos[idx]));
                    }

                    if (deleteBtn) {
                        deleteBtn.addEventListener('click', () => this.deleteVideo(idx));
                    }
                });
            },

            createVideoCard(video) {
                const videoId = this.extractYoutubeId(video.url);
                const embedUrl = `https://www.youtube.com/embed/${videoId}`;

                return `
                    <div class="video-card">
                        <div class="video-embed">
                            <iframe src="${embedUrl}" allowfullscreen></iframe>
                        </div>
                        <div class="video-content">
                            <div class="video-title">${this.escapeHtml(video.title)}</div>
                            <div class="video-desc">${this.escapeHtml(video.description || '')}</div>
                            <div class="video-actions">
                                <button class="product-actions button btn-edit">✏️ تعديل</button>
                                <button class="product-actions button btn-delete">🗑️ حذف</button>
                            </div>
                        </div>
                    </div>
                `;
            },

            extractYoutubeId(url) {
                const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
                const match = url.match(regExp);
                return (match && match[7].length === 11) ? match[7] : null;
            },

            openVideoModal(video = null) {
                this.editingVideoId = video ? this.videos.indexOf(video) : null;
                const modal = document.getElementById('videoModal');
                const form = document.getElementById('videoForm');

                if (video) {
                    document.getElementById('videoModalTitle').textContent = 'تعديل الفيديو';
                    form.elements['videoTitle'].value = video.title;
                    form.elements['videoUrl'].value = video.url;
                    form.elements['videoDescription'].value = video.description || '';
                } else {
                    document.getElementById('videoModalTitle').textContent = 'إضافة فيديو جديد';
                    form.reset();
                }

                modal.classList.add('active');
            },

            async saveVideo() {
                const form = document.getElementById('videoForm');
                const video = {
                    id: this.editingVideoId !== null ? this.videos[this.editingVideoId].id : Date.now(),
                    title: form.elements['videoTitle'].value.trim(),
                    url: form.elements['videoUrl'].value.trim(),
                    description: form.elements['videoDescription'].value.trim(),
                    createdAt: this.editingVideoId !== null ? this.videos[this.editingVideoId].createdAt : new Date().toISOString()
                };

                // === VALIDATION ===
                if (!video.title || !video.url) {
                    alert('يرجى ملء جميع الحقول المطلوبة');
                    return;
                }

                if (!this.extractYoutubeId(video.url)) {
                    alert('يرجى إدخال رابط YouTube صحيح');
                    return;
                }

                if (this.editingVideoId !== null) {
                    this.videos[this.editingVideoId] = video;
                } else {
                    this.videos.push(video);
                }

                localStorage.setItem(`videos_${this.currentStore.id}`, JSON.stringify(this.videos));

                document.getElementById('videoModal').classList.remove('active');
                this.loadVideos();
                alert('✅ تم حفظ الفيديو بنجاح');
            },

            editVideo(video) {
                this.openVideoModal(video);
            },

            deleteVideo(index) {
                if (confirm('هل تريد حذف هذا الفيديو؟')) {
                    this.videos.splice(index, 1);
                    localStorage.setItem(`videos_${this.currentStore.id}`, JSON.stringify(this.videos));
                    this.loadVideos();
                    alert('✅ تم حذف الفيديو');
                }
            },

            filterVideos(searchText) {
                const filtered = this.videos.filter(v => 
                    v.title.toLowerCase().includes(searchText.toLowerCase()) ||
                    (v.description && v.description.toLowerCase().includes(searchText.toLowerCase()))
                );

                const grid = document.getElementById('videosGrid');
                grid.innerHTML = filtered.map(v => this.createVideoCard(v)).join('');
            },

            // === SETTINGS ===
            loadSettings() {
                document.getElementById('storeName').value = this.currentStore.storeName;
                document.getElementById('storeAddress').value = this.currentStore.address || '';
                document.getElementById('storePhone').value = this.currentStore.phone || '';
                document.getElementById('storeDesc').value = this.currentStore.description || '';
            },

            // === UTILITIES ===
            showMessage(element, text, type) {
                element.textContent = text;
                element.className = `status-message ${type}`;
            },

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        };
